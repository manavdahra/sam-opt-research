model: resnet18
epochs: 200
batch_size: 256
lr: 0.1
momentum: 0.9
weight_decay: 5.0e-4
# seeds: [0, 1, 2]
seeds: [42]
data_dir: ./data
runs_dir: ./results/runs
experiments_dir: ./results/experiments
num_workers: 4
resize: null  # no resize for ResNet-18 on CIFAR-10

optimizers:
  sgd:
    type: sgd
  sam:
    type: sam
    rho_sweep: [0.005, 0.01, 0.02, 0.03, 0.05]
  asam:
    type: asam
    rho_sweep: [0.5]
    eta: 0.01
  msam:
    type: msam
    rho_sweep: [0.005, 0.01, 0.02, 0.03, 0.05]
