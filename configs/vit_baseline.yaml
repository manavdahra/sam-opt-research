model: vit_b_32
epochs: 50
batch_size: 128
lr: 0.01
momentum: 0.9
weight_decay: 5.0e-4
seeds: [0, 1, 2]
data_dir: ./data
results_dir: ./results/baseline
num_workers: 4
resize: 224  # ViT-B/32 expects 224×224 inputs
pretrained: true

optimizers:
  sgd:
    type: sgd
  sam:
    type: sam
    rho_sweep: [0.005, 0.01, 0.02, 0.03, 0.05]
  asam:
    type: asam
    rho_sweep: [0.5]
    eta: 0.01
  msam:
    type: msam
    rho_sweep: [0.005, 0.01, 0.02, 0.03, 0.05]
