model: resnet18
epochs: 200
batch_size: 256
lr: 0.1
momentum: 0.9
weight_decay: 5.0e-4
seeds: [40, 41, 42]
data_dir: ./data
runs_dir: ./results/resnet18/runs
experiments_dir: ./results/resnet18/experiments
num_workers: 4
resize: null  # no resize for ResNet-18 on CIFAR-10
max_samples: 20

optimizers:
  sgd:
    type: sgd
  sam:
    type: sam
    rho_sweep: [0.05, 0.1, 0.5]
  asam:
    type: asam
    eta: 0.01
    rho_sweep: [0.05, 0.1, 0.5]
  msam:
    type: msam
    rho_sweep: [0.05, 0.1, 0.5]
