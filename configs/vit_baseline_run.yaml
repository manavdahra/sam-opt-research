model: vit_b_32
epochs: 50
batch_size: 256
lr: 0.01
momentum: 0.9
weight_decay: 5.0e-4
seeds: [40, 41, 42]
data_dir: ./data
runs_dir: ./results/vit_b_32/runs
experiments_dir: ./results/vit_b_32/experiments
num_workers: 4
resize: 224  # ViT-B/32 expects 224×224 inputs
pretrained: true
max_samples: null

optimizers:
  sgd:
    type: sgd
  sam:
    type: sam
    rho_sweep: [0.05, 0.1, 0.5]
  asam:
    type: asam
    eta: 0.01
    rho_sweep: [0.05, 0.1, 0.5]
  msam:
    type: msam
    rho_sweep: [0.05, 0.1, 0.5]
